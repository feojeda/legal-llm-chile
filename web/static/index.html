<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal LLM Chile - Comparador</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .model-selector {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .model-option {
            flex: 1;
            min-width: 200px;
            cursor: pointer;
        }

        .model-option input {
            display: none;
        }

        .model-card {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
            transition: all 0.2s;
            position: relative;
        }

        .model-option input:checked + .model-card {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .model-card:hover {
            border-color: var(--surface-hover);
        }

        .model-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .model-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .model-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .loaded-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.65rem;
            background: var(--success);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .params-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .param-input {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .param-input label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .param-input input[type="number"],
        .param-input input[type="range"] {
            width: 100%;
        }

        input[type="number"] {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem;
            color: var(--text);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .result-header {
            background: var(--bg);
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .result-badge {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .badge-base { background: #475569; color: white; }
        .badge-qlora { background: #7c3aed; color: white; }
        .badge-adam { background: #059669; color: white; }
        .badge-gemma4_base { background: #db2777; color: white; }
        .badge-gemma4_trained { background: #ea580c; color: white; }

        .result-body {
            padding: 1.25rem;
            min-height: 150px;
        }

        .result-text {
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .result-placeholder {
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            padding: 2rem 0;
        }

        .error-text {
            color: var(--error);
        }

        .prompt-display {
            background: var(--bg);
            border: 1px dashed var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-style: italic;
            color: var(--text-muted);
        }

        .prompt-display strong {
            color: var(--text);
        }

        .hidden { display: none; }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .results-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Legal LLM Chile - Comparador</h1>
            <p>Compara Qwen 3.5 0.8B y Gemma 4 E2B (base vs entrenados con el Codigo Penal chileno)</p>
        </header>

        <div class="status-bar" id="statusBar">
            <div class="status-item">
                <span class="status-dot"></span>
                <span id="gpuStatus">Verificando GPU...</span>
            </div>
            <div class="status-item">
                <span id="loadedModels">Modelos en memoria: 0/5</span>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">1. Escribe tu prompt legal</div>
            <div class="input-group">
                <textarea id="promptInput" placeholder="Ejemplo: Articulo 1 del Codigo Penal establece que..."></textarea>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">2. Selecciona los modelos a comparar</div>
            <div class="model-selector" id="modelSelector">
                <label class="model-option">
                    <input type="checkbox" name="model" value="base" checked>
                    <div class="model-card" id="card-base">
                        <div class="model-icon">📘</div>
                        <div class="model-name">Modelo Base</div>
                        <div class="model-desc">Qwen 3.5 0.8B original</div>
                    </div>
                </label>
                <label class="model-option">
                    <input type="checkbox" name="model" value="qlora">
                    <div class="model-card" id="card-qlora">
                        <div class="model-icon">⚖️</div>
                        <div class="model-name">QLoRA 3 epochs</div>
                        <div class="model-desc">Entrenado con Codigo Penal</div>
                    </div>
                </label>
                <label class="model-option">
                    <input type="checkbox" name="model" value="adam" checked>
                    <div class="model-card" id="card-adam">
                        <div class="model-icon">🧠</div>
                        <div class="model-name">AdamW8bit 5 epochs</div>
                        <div class="model-desc">QLoRA + Adam optimizado</div>
                    </div>
                </label>
                <label class="model-option">
                    <input type="checkbox" name="model" value="gemma4_base">
                    <div class="model-card" id="card-gemma4_base">
                        <div class="model-icon">💎</div>
                        <div class="model-name">Gemma 4 Base</div>
                        <div class="model-desc">Gemma 4 E2B original</div>
                    </div>
                </label>
                <label class="model-option">
                    <input type="checkbox" name="model" value="gemma4_trained">
                    <div class="model-card" id="card-gemma4_trained">
                        <div class="model-icon">🔮</div>
                        <div class="model-name">Gemma 4 Entrenado</div>
                        <div class="model-desc">QLoRA 1 epoch + CPT</div>
                    </div>
                </label>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">3. Parametros de generacion (opcional)</div>
            <div class="params-grid">
                <div class="param-input">
                    <label for="maxTokens">Max tokens</label>
                    <input type="number" id="maxTokens" value="150" min="10" max="512">
                </div>
                <div class="param-input">
                    <label for="temperature">Temperature</label>
                    <input type="number" id="temperature" value="0.7" min="0.1" max="2.0" step="0.1">
                </div>
                <div class="param-input">
                    <label for="topP">Top-p</label>
                    <input type="number" id="topP" value="0.9" min="0.1" max="1.0" step="0.05">
                </div>
            </div>
        </div>

        <button class="btn btn-primary" id="generateBtn" onclick="generate()">
            <span>Generar comparacion</span>
        </button>

        <div id="resultsSection" class="hidden" style="margin-top: 2rem;">
            <div class="panel-title">Resultados</div>
            <div class="prompt-display" id="promptDisplay"></div>
            <div class="results-grid" id="resultsGrid"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function checkHealth() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();
                const gpuText = data.cuda_available
                    ? `GPU: ${data.gpu}`
                    : 'GPU no disponible (sera muy lento)';
                document.getElementById('gpuStatus').textContent = gpuText;
                updateLoadedModels(data.loaded_models);
            } catch (e) {
                document.getElementById('gpuStatus').textContent = 'Backend no responde';
            }
        }

        async function fetchModels() {
            try {
                const res = await fetch(`${API_BASE}/models`);
                const data = await res.json();
                updateLoadedModels(Object.keys(data).filter(k => data[k].loaded));
            } catch (e) {
                console.error('Error cargando modelos:', e);
            }
        }

        function updateLoadedModels(loaded) {
            const count = loaded ? loaded.length : 0;
            document.getElementById('loadedModels').textContent = `Modelos en memoria: ${count}/5`;
            
            ['base', 'qlora', 'adam', 'gemma4_base', 'gemma4_trained'].forEach(key => {
                const card = document.getElementById(`card-${key}`);
                const existing = card.querySelector('.loaded-badge');
                if (existing) existing.remove();
                
                if (loaded && loaded.includes(key)) {
                    const badge = document.createElement('span');
                    badge.className = 'loaded-badge';
                    badge.textContent = 'CARGADO';
                    card.appendChild(badge);
                }
            });
        }

        async function generate() {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) {
                alert('Escribe un prompt primero');
                return;
            }

            const selected = Array.from(document.querySelectorAll('input[name="model"]:checked'))
                .map(cb => cb.value);
            if (selected.length === 0) {
                alert('Selecciona al menos un modelo');
                return;
            }

            const btn = document.getElementById('generateBtn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div><span>Generando...</span>';

            const resultsSection = document.getElementById('resultsSection');
            const resultsGrid = document.getElementById('resultsGrid');
            const promptDisplay = document.getElementById('promptDisplay');

            // Mostrar resultados vacios mientras carga
            resultsSection.classList.remove('hidden');
            promptDisplay.innerHTML = `<strong>Prompt:</strong> ${escapeHtml(prompt)}`;
            resultsGrid.innerHTML = selected.map(key => `
                <div class="result-card">
                    <div class="result-header">
                        <h3>${getModelLabel(key)}</h3>
                        <span class="result-badge badge-${key}">${key.toUpperCase()}</span>
                    </div>
                    <div class="result-body">
                        <div class="result-placeholder">Cargando modelo y generando respuesta...<br>Esto puede tardar un minuto la primera vez.</div>
                    </div>
                </div>
            `).join('');

            // Scroll a resultados
            resultsSection.scrollIntoView({ behavior: 'smooth' });

            try {
                const res = await fetch(`${API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        models: selected,
                        max_new_tokens: parseInt(document.getElementById('maxTokens').value),
                        temperature: parseFloat(document.getElementById('temperature').value),
                        top_p: parseFloat(document.getElementById('topP').value),
                    }),
                });

                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.detail || 'Error en el servidor');
                }

                renderResults(data, selected);
                await fetchModels(); // Actualizar badges de cargados
            } catch (err) {
                resultsGrid.innerHTML = `
                    <div class="result-card" style="grid-column: 1 / -1;">
                        <div class="result-body">
                            <div class="result-text error-text">Error: ${escapeHtml(err.message)}</div>
                        </div>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        }

        function renderResults(data, order) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = order.map(key => {
                const item = data[key];
                const isError = typeof item === 'string' || (item.generated && item.generated.startsWith('Error'));
                const text = typeof item === 'string' ? item : (item.generated || 'Sin respuesta');
                const label = typeof item === 'string' ? getModelLabel(key) : (item.label || getModelLabel(key));
                
                return `
                    <div class="result-card">
                        <div class="result-header">
                            <h3>${escapeHtml(label)}</h3>
                            <span class="result-badge badge-${key}">${key.toUpperCase()}</span>
                        </div>
                        <div class="result-body">
                            <div class="result-text ${isError ? 'error-text' : ''}">${escapeHtml(text)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getModelLabel(key) {
            const labels = {
                base: 'Modelo Base (Qwen 3.5 0.8B)',
                qlora: 'Entrenado QLoRA (3 epochs)',
                adam: 'Entrenado AdamW8bit (5 epochs)',
                gemma4_base: 'Gemma 4 E2B Base',
                gemma4_trained: 'Gemma 4 E2B Entrenado (QLoRA 1 epoch)',
            };
            return labels[key] || key;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Verificar estado al cargar
        checkHealth();
        fetchModels();
        setInterval(fetchModels, 10000); // Actualizar cada 10 seg
    </script>
</body>
</html>
